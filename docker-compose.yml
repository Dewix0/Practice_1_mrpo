services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
      - ./import:/app/import:ro
    environment:
      - DB_PATH=/app/data/data.db
      - UPLOADS_DIR=/app/uploads
      - JWT_SECRET=shoe-store-secret-key

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
  uploads:
